<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Information Form</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: left;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            font-weight: bold;
            display: block;
        }
        .form-row {
            display: flex;
            gap: 10px;
        }
        .form-row .form-group {
            flex: 1;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .submit-button {
            background-color: red;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
        .back-link {
            color: blue;
            cursor: pointer;
            text-decoration: underline;
        }
        .privacy-text {
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Tell us a little about yourself</h2>
        
        <form>
            <div class="form-row">
                <div class="form-group">
                    <label>First name *</label>
                    <input type="text" name="first_name" required>
                </div>
                <div class="form-group">
                    <label>Last name *</label>
                    <input type="text" name="last_name" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Business email *</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Company name *</label>
                    <input type="text" name="company_name" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Country</label>
                    <select name="country">
                        <option>United States</option>
                        <option>Canada</option>
                        <option>United Kingdom</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>State/Province/Region</label>
                    <select name="state">
                        <option>Armed Forces Americas</option>
                        <option>Armed Forces Europe</option>
                        <option>California</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Phone number *</label>
                    <div class="form-row">
                        <select name="phone_code">
                            <option>+1</option>
                            <option>+44</option>
                            <option>+91</option>
                            <option>Other</option>
                        </select>
                        <input type="text" name="phone_number" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Industry</label>
                    <select name="industry">
                        <option>Telecom</option>
                        <option>IT</option>
                        <option>Healthcare</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Job title</label>
                <input type="text" name="job_title">
            </div>

            <p class="privacy-text">
                By clicking the "Submit", you agree that your information is collected and used for the purpose of responding to your inquiry in accordance with the <a href="#">Privacy Policy</a> and <a href="#">Terms of Use</a>.
            </p>
            
            <div class="button-group">
                <span class="back-link" onclick="goBack()">← Back</span>
                <button type="submit" class="submit-button">Submit</button>
            </div>
        </form>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
