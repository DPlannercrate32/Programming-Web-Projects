<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoCE Networking Solution Requirements</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .counter {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .counter button {
            width: 30px;
            height: 30px;
            background: #ddd;
            border: none;
            cursor: pointer;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>What are your RoCE Networking Solution requirements?</h2>
        <p><strong>1. Please provide us with your RoCE Network application scenarios and basic needs</strong></p>
        
        <div class="form-group">
            <label>Scenario *</label>
            <div class="checkbox-group">
                <label><input type="radio" name="scenario"> Deep Learning</label>
                <label><input type="radio" name="scenario"> High-performance computing</label>
                <label><input type="radio" name="scenario"> Data center</label>
                <label><input type="radio" name="scenario"> Cloud scenario</label>
                <label><input type="radio" name="scenario"> Other</label>
            </div>
        </div>
        
        <div class="form-group">
            <label>NIC Speed *</label>
            <input type="text" placeholder="Enter more details">
        </div>
        
        <div class="form-group">
            <label>Number of NICs</label>
            <div class="counter">
                <button type="button" onclick="decrease('num_nics')">-</button>
                <input type="number" id="num_nics" value="1" min="1">
                <button type="button" onclick="increase('num_nics')">+</button>
            </div>
        </div>
        
        <div class="form-group">
            <label>NIC Type</label>
            <input type="text" placeholder="Enter more details">
        </div>
        
        <div class="form-group">
            <label>Operating System *</label>
            <div class="checkbox-group">
                <label><input type="checkbox"> Microsoft Windows Server</label>
                <label><input type="checkbox"> VMware ESXi</label>
                <label><input type="checkbox"> Red Hat Enterprise Linux</label>
                <label><input type="checkbox"> CentOS</label>
                <label><input type="checkbox"> Other</label>
            </div>
        </div>
        
        <div class="form-group">
            <label>Switch Management Platform</label>
            <input type="text" placeholder="Enter more details">
        </div>
	<p><strong>2. Please provide us with your ROCE Network business needs</p>
        <form>
            <div class="form-group">
                <label>Network Type *</label><br>
                <input type="checkbox"> Spine
                <input type="checkbox"> Leaf
                <input type="checkbox"> Server
                <input type="checkbox"> Other
            </div>
            <div class="form-group">
                <label>Bandwidth Information *</label><br>
                <input type="checkbox"> 400G
                <input type="checkbox"> 200G
                <input type="checkbox"> 100G
                <input type="checkbox"> 40G
                <input type="checkbox"> Other
            </div>
            <div class="form-group">
                <label>Expected Convergence Ratio</label><br>
                <input type="text" placeholder="Enter more details">
            </div>
            <div class="form-group">
                <label>Other Equipment Requirements</label><br>
                <input type="checkbox"> Server
                <input type="checkbox"> Switching
                <input type="checkbox"> Optical Transceivers
                <input type="checkbox"> Cables
            </div>
            <div class="form-group">
                <label>Leave a message for other project descriptions in detail</label>
                <textarea placeholder="We are capable of working out a professional solution to maximize the utilization of the equipment..."></textarea>
            </div>
            <div class="form-group">
                <label>Upload File</label>
                <input type="file">
            </div>
            <div class="btn-container">
                <button type="button" class="btn">Back</button>
                <button type="submit" class="btn">Next</button>
            </div>
        </form>
    </div>

    <script>
        function decrease(id) {
            let input = document.getElementById(id);
            if (input.value > 1) input.value--;
        }
        function increase(id) {
            let input = document.getElementById(id);
            input.value++;
        }
    </script>
</body>
</html>
