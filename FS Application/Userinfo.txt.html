<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Information Form</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .container {
            width: 60%;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: left;
        }
        .form-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .form-group label {
            width: 100%;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 48%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .full-width {
            width: 100% !important;
        }
        .submit-btn {
            background-color: red;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        .submit-btn:hover {
            background-color: darkred;
        }
        .back-link {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            color: blue;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Tell us a little about yourself</h2>
        <form action="#" method="post">
            <div class="form-group">
                <input type="text" name="first_name" placeholder="First name *" required>
                <input type="text" name="last_name" placeholder="Last name *" required>
            </div>
            <div class="form-group">
                <input type="email" name="business_email" placeholder="Business email *" required>
                <input type="text" name="company_name" placeholder="Company name *" required>
            </div>
            <div class="form-group">
                <select name="country">
                    <option>United States</option>
                </select>
                <select name="state">
                    <option>Armed Forces Americas</option>
                </select>
            </div>
            <div class="form-group">
                <select name="phone_code">
                    <option>+1</option>
                </select>
                <input type="text" name="phone_number" placeholder="Phone number *" required>
            </div>
            <div class="form-group">
                <input type="text" name="job_title" placeholder="Job title" class="full-width">
            </div>
            <div class="form-group">
                <select name="industry" class="full-width">
                    <option>Telecom</option>
                </select>
            </div>
            <p>By clicking the "Submit", you agree that your information is collected and used for the purpose of responding to your inquiry in accordance with the <a href="#">Privacy Policy</a> and <a href="#">Terms of Use</a>.</p>
            <button type="submit" class="submit-btn">Submit</button>
        </form>
        <a href="#" class="back-link">&larr; Back</a>
    </div>
</body>
</html>
